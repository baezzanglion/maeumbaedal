<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>마음배달 · 봉투</title>
<style>
  :root{
    --coral:#E8503A; --coral-soft:#F27860; --coral-ink:#C23A26;
    --sponge:#F4C430; --sponge-deep:#E6A50E;
    --cream:#FDF6EC; --paper:#FFFBF3; --peach:#FCE7DA;
    --brown:#8B5E3C; --brown-soft:#B5875E;
    --ink:#3D2B1F; --ink-soft:#6E5A48;
    --line:#EADFCF;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Pretendard",system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(120% 80% at 80% 0%, #FCEEE3 0%, var(--peach) 42%, var(--cream) 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    line-height:1.55;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 20px 64px}
  .brandbar{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .brandbar .logo{width:34px;height:34px;object-fit:contain}
  .brandbar h1{font-size:19px;margin:0;letter-spacing:-.02em;font-weight:800}
  .tagline{text-align:center;color:var(--ink-soft);font-size:13px;margin:0 0 26px}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 10px 30px -18px rgba(140,94,60,.5);padding:24px}
  .h2{font-size:16px;font-weight:800;margin:0 0 4px;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--ink-soft);margin:0 0 18px}

  label.f{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin:0 0 8px}
  textarea{width:100%;min-height:190px;resize:vertical;border:1px solid var(--line);
    border-radius:14px;padding:14px 15px;font:inherit;font-size:14px;color:var(--ink);
    background:var(--cream);line-height:1.7}
  textarea:focus{outline:none;border-color:var(--coral-soft);box-shadow:0 0 0 3px rgba(242,120,96,.18)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px}
  .count{font-size:12.5px;color:var(--ink-soft)}

  button{font:inherit;cursor:pointer;border:none;border-radius:999px}
  .btn{background:var(--coral);color:#fff;font-weight:800;font-size:14.5px;
    padding:12px 22px;box-shadow:0 8px 18px -8px rgba(232,80,58,.7);transition:transform .12s ease,filter .12s ease}
  .btn:hover{filter:brightness(1.04)} .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--coral-ink);box-shadow:none;border:1.5px solid #F3CFC6}
  .btn.small{padding:8px 14px;font-size:12.5px}
  .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

  .note{font-size:12px;color:var(--ink-soft);background:#FBF0E6;border:1px dashed #E7C9B4;
    border-radius:12px;padding:10px 12px;margin-top:16px}
  .note b{color:var(--coral-ink)}

  input.f-in,select.f-in{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 13px;
    font:inherit;font-size:14px;color:var(--ink);background:var(--cream)}
  input.f-in:focus,select.f-in:focus{outline:none;border-color:var(--coral-soft);box-shadow:0 0 0 3px rgba(242,120,96,.18)}
  textarea.mini{min-height:118px}
  details.settings{margin:0 0 18px;border:1px solid var(--line);border-radius:16px;overflow:hidden}
  details.settings>summary{cursor:pointer;list-style:none;padding:13px 15px;font-weight:800;font-size:13.5px;
    color:var(--ink);background:var(--cream);display:flex;align-items:center;gap:7px}
  details.settings>summary::-webkit-details-marker{display:none}
  details.settings>summary .arrow{margin-left:auto;transition:transform .2s ease;color:var(--ink-soft)}
  details.settings[open]>summary .arrow{transform:rotate(180deg)}
  .settings-body{padding:15px}
  .fieldrow{margin-bottom:14px} .fieldrow:last-child{margin-bottom:0}
  .grid2{display:flex;gap:12px;flex-wrap:wrap} .grid2>div{flex:1;min-width:150px}

  /* envelope list */
  .env-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
  @media(max-width:560px){.env-list{grid-template-columns:1fr}}
  .env-row{display:flex;align-items:center;gap:12px;background:var(--cream);
    border:1px solid var(--line);border-radius:14px;padding:11px 13px}
  .env-mini{width:34px;height:26px;flex:0 0 auto}
  .env-row .nm{font-weight:800;font-size:14px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .env-row .acts{display:flex;gap:6px;flex:0 0 auto}

  /* recipient */
  .stage{min-height:66vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-top:8px}
  .to{font-size:13.5px;color:var(--ink-soft);margin:0 0 14px}
  .to b{color:var(--ink)}
  .env{position:relative;width:300px;height:200px;cursor:pointer;filter:drop-shadow(0 18px 24px -16px rgba(140,94,60,.55))}
  .env.opened{cursor:default}
  .env svg{display:block;width:100%;height:100%;overflow:visible}
  .seal{transition:opacity .4s ease,transform .5s cubic-bezier(.4,0,.2,1);transform-origin:150px 118px}
  .env.opened .seal{opacity:0;transform:scale(.4) rotate(-12deg)}
  .flap{transition:transform .6s cubic-bezier(.5,-.2,.3,1.2);transform-origin:150px 60px}
  .env.opened .flap{transform:rotateX(180deg)}
  .tap-hint{margin-top:20px;font-size:13px;color:var(--coral-ink);font-weight:700}
  .env:hover .lift{transform:translateY(-3px)} .lift{transition:transform .3s ease}

  .letter{width:100%;max-width:340px;margin-top:26px;background:var(--paper);
    border:1px solid var(--line);border-radius:18px;padding:22px 22px 24px;
    box-shadow:0 16px 34px -20px rgba(140,94,60,.6);
    opacity:0;transform:translateY(18px);transition:opacity .5s ease .35s,transform .55s cubic-bezier(.2,.7,.2,1) .35s}
  .letter.show{opacity:1;transform:translateY(0)}
  .kino{width:78px;height:84px;margin:-6px auto 8px;display:block}
  .lead{font-size:12.5px;color:var(--ink-soft);letter-spacing:.02em;margin:0 0 4px}
  .target{font-size:26px;font-weight:900;letter-spacing:-.02em;margin:0 0 2px;color:var(--coral-ink)}
  .target-sfx{font-size:12.5px;color:var(--ink-soft);margin:0 0 18px}
  .m-title{font-size:12.5px;font-weight:800;color:var(--ink);text-align:left;margin:0 0 9px;
    display:flex;align-items:center;gap:6px}
  .m-title .pill{background:var(--sponge);color:#6b4e00;font-size:11px;font-weight:800;border-radius:999px;padding:2px 9px}
  .m{display:flex;gap:9px;text-align:left;background:var(--cream);border:1px solid var(--line);
    border-radius:12px;padding:11px 12px;margin-bottom:8px;font-size:13.5px;line-height:1.5}
  .m .no{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--coral);color:#fff;
    font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .rules{margin-top:16px;font-size:11.5px;color:var(--ink-soft);text-align:left;
    background:#FBF0E6;border-radius:12px;padding:11px 13px;line-height:1.7}
  .rules b{color:var(--coral-ink)}
  .backlink{margin-top:22px}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:700;padding:11px 18px;border-radius:999px;
    opacity:0;pointer-events:none;transition:all .28s ease;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .kino-img{width:120px;height:auto;display:block;margin:-12px auto 8px;
    filter:drop-shadow(0 10px 12px rgba(140,94,60,.26))}
  .hero{width:100%;max-width:520px;border-radius:20px;display:block;margin:0 auto 2px;
    box-shadow:0 14px 30px -18px rgba(140,94,60,.5)}

  @media (prefers-reduced-motion: reduce){
    .flap,.seal,.letter,.lift,.btn{transition:none !important}
  }
</style>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ---------- 기본값 (첫 화면에서 수정 가능 · 이 브라우저에 자동 저장) ---------- */
const DEFAULT_MISSIONS = [
  "이번 주 안에, 마니또의 글에 응원 이모지를 살짝 남겨주세요 🤫",
  "마니또의 글이 눈에 띄면, 다정한 댓글 한 줄 티 안 나게 툭 남기기 💬",
  "마니또에게 티 안 나게 응원의 셸 하나 보내기 🐚",
  "마니또가 뭔가 해냈을 때(아주 작은 것도!) 제일 먼저 🎉 눌러주기",
  "마니또에게 어울릴 것 같은 응원 문구나 이모지 하나, 살짝 골라 전하기",
  "마니또가 조용한 하루를 보낸 것 같으면, \"잘 지내죠? 🤫\" 한 스푼 건네기",
  "마니또의 이번 주 목표를 몰래 응원하는 마음으로, 다정한 한마디 남기기",
  "마니또의 과제/기록에 도움이 될 의견 한 스푼 보태기 ✍️",
  "마니또가 남긴 글/기록을 끝까지 읽고, 마음이 담긴 반응 하나 남기기 📖",
  "마니또의 하루가 가벼워지게, 소소한 칭찬 한 스푼 슬쩍 건네기 🍯"
];
const DEFAULT_MISSION_TITLE = "가볍게 한 스푼씩";
const DEFAULT_MISSIONS_PER = 2;
const DEFAULT_RULES = [
  "비밀이에요. 내가 누구인지는 3주차 마니또 발표 전까지 살짝 숨겨주세요.",
  "채널 안에서. 다정한 챙김은 스폰지클럽 슬랙 채널에서 해요. 개인 DM은 아직 서로 어색하니까요 🙂",
  "한 스푼이면 충분. 티 안 나게, 그러나 진심으로.",
  "곧 깜짝 미션. 슬랙에 툭 떨어질 수도 있어요 👀"
];
/* 규칙이 안 담긴 '옛 링크'(어제 2조 등)는 아래 원문 그대로 열려요 — 하위호환 보장 */
const LEGACY_RULES_HTML = `<b>· 비밀이에요.</b> 내가 누구인지는 3주차 마니또 발표 전까지 살짝 숨겨주세요.<br><b>· 채널 안에서.</b> 다정한 챙김은 스폰지클럽 슬랙 채널에서 해요. 개인 DM은 아직 서로 어색하니까요 🙂<br><b>· 한 스푼이면 충분.</b> 티 안 나게, 그러나 진심으로.<br><b>· 곧 깜짝 미션</b>이 슬랙에 툭 떨어질 수도 있어요 👀`;

/* 설정 저장/복원 (localStorage — 팀·브라우저별로 각자 기억) */
const CFG_KEY = 'mb_cfg_v1';
function loadCfg(){
  let s=null; try{ s=JSON.parse(localStorage.getItem(CFG_KEY)||'null'); }catch(e){}
  return {
    title:    (s && typeof s.title==='string' && s.title) ? s.title : DEFAULT_MISSION_TITLE,
    per:      (s && s.per>=1 && s.per<=3) ? s.per : DEFAULT_MISSIONS_PER,
    missions: (s && Array.isArray(s.missions) && s.missions.length) ? s.missions : DEFAULT_MISSIONS.slice(),
    rules:    (s && Array.isArray(s.rules) && s.rules.length) ? s.rules : DEFAULT_RULES.slice()
  };
}
function saveCfg(c){ try{ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }catch(e){} }

/* 규칙 렌더: 한 줄=한 규칙, 첫 문장(마침표까지)이 굵게 */
function rulesHTML(lines){
  return lines.map(raw=>{
    const line=String(raw).trim(); if(!line) return '';
    const i=line.indexOf('.');
    if(i>=0) return `<b>· ${esc(line.slice(0,i+1))}</b> ${esc(line.slice(i+1)).trim()}`;
    return `<b>· ${esc(line)}</b>`;
  }).filter(Boolean).join('<br>');
}

/* 데모용 목데이터(닉네임) — 운영 시 실제 이름으로 교체 */
const MOCK = ["보리","달래","여름","한스푼","코랄","포근","살구","다정","토닥","곁에","우체통","노랑"].join("\n");

/* ---------- 뽑기 엔진: 단일 사이클 셔플 ---------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function drawAssignments(names, cfg){
  const pool = (cfg && cfg.missions && cfg.missions.length) ? cfg.missions : DEFAULT_MISSIONS;
  const per  = (cfg && cfg.per) ? cfg.per : DEFAULT_MISSIONS_PER;
  const p = shuffle(names);
  return p.map((giver,i)=>({
    giver,
    target: p[(i+1)%p.length],              // 자기자신 제외 + 전원 1:1 순환 보장
    missions: shuffle(pool).slice(0, Math.min(per, pool.length))
  }));
}

/* ---------- UTF-8 안전 base64 (봉투 링크 payload) ---------- */
const b64 = {
  enc:o=>btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(o)))).replace(/=+$/,''),
  dec:s=>{try{const b=atob(s);const u=Uint8Array.from(b,c=>c.charCodeAt(0));return JSON.parse(new TextDecoder().decode(u));}catch(e){return null;}}
};

  <rect x="66" y="82" width="8" height="14" rx="4" fill="var(--ink)"/>
  <path d="M52 104 q8 7 16 0" stroke="var(--ink)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M18 52 q42 -30 84 0 q2 -20 -18 -24 q-24 -6 -48 0 q-20 4 -18 24Z" fill="var(--coral)" stroke="var(--brown)" stroke-width="4" stroke-linejoin="round"/>
  <path d="M60 20 q4 -6 8 -1 q3 4 -8 10 q-11 -6 -8 -10 q4 -5 8 1Z" fill="var(--cream)"/>
</svg>`;}

/* 봉투 SVG (닫힘/열림 애니는 CSS가 제어) */
function envSVG(){return `
<svg viewBox="0 0 300 200">
  <rect x="10" y="52" width="280" height="138" rx="16" fill="var(--cream)" stroke="var(--brown)" stroke-width="4"/>
  <path d="M18 60 L150 140 L282 60" fill="none" stroke="var(--brown-soft)" stroke-width="3" opacity=".7"/>
  <path class="flap" d="M14 58 L150 132 L286 58 L286 60 Q286 52 278 52 L22 52 Q14 52 14 60 Z" fill="var(--sponge)" stroke="var(--brown)" stroke-width="4" stroke-linejoin="round"/>
  <g class="seal">
    <circle cx="150" cy="118" r="19" fill="var(--coral)" stroke="var(--coral-ink)" stroke-width="2"/>
    <path d="M150 112 q3 -5 7 -1 q3 3 -7 9 q-10 -6 -7 -9 q4 -4 7 1Z" fill="#fff"/>
  </g>
</svg>`;}

function envMini(){return `<svg class="env-mini" viewBox="0 0 44 34"><rect x="2" y="6" width="40" height="26" rx="5" fill="var(--cream)" stroke="var(--brown)" stroke-width="2.5"/><path d="M4 8 L22 22 L40 8" fill="none" stroke="var(--brown)" stroke-width="2.5"/><path d="M22 24 q3 -4 6 -1" fill="none"/><circle cx="22" cy="16" r="4.5" fill="var(--coral)"/></svg>`;}

/* ---------- 상태 & 렌더 ---------- */
const app = document.getElementById('app');
let ASSIGN = null;
let CFG = loadCfg();

function brand(){return `<div class="brandbar"><img class="logo" src="${ASSETS.logo}" alt="마음배달"><h1>마음배달</h1></div><p class="tagline">누군지 모른 채 챙기고, 마지막 날 밝혀지는 다정한 챙김</p>`;}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

function renderOperator(){
  const c = CFG;
  app.innerHTML = brand() + `
  <div class="card">
    <p class="h2">운영자 화면 · 마음배달 뽑기</p>
    <p class="sub">참가자를 한 줄에 한 명씩 적고 <b>뽑기 실행</b>을 누르세요. 사람마다 '봉투 링크'가 만들어져요.</p>

    <details class="settings" id="settings">
      <summary>✏️ 봉투 내용 설정 <span style="font-weight:600;color:var(--ink-soft)">— 미션·규칙·제목을 팀에 맞게</span><span class="arrow">▾</span></summary>
      <div class="settings-body">
        <div class="grid2 fieldrow">
          <div>
            <label class="f">미션 제목 (봉투 상단)</label>
            <input class="f-in" id="mtitle" maxlength="40" value="${esc(c.title)}">
          </div>
          <div>
            <label class="f">사람당 미션 개수</label>
            <select class="f-in" id="mper">${[1,2,3].map(n=>`<option value="${n}"${n===c.per?' selected':''}>${n}개</option>`).join('')}</select>
          </div>
        </div>
        <div class="fieldrow">
          <label class="f">미션 목록 (한 줄에 하나 · 이 중에서 사람마다 무작위로 뽑아요)</label>
          <textarea class="mini" id="mlist">${esc(c.missions.join('\n'))}</textarea>
        </div>
        <div class="fieldrow">
          <label class="f">규칙 (한 줄에 하나 · 첫 문장이 굵게 · 예: 채널명·발표 시점)</label>
          <textarea class="mini" id="mrules">${esc(c.rules.join('\n'))}</textarea>
        </div>
        <div class="row" style="margin-top:2px">
          <button class="btn ghost small" id="resetCfg">기본값으로 되돌리기 ↺</button>
          <span class="count">변경사항은 이 브라우저에 자동 저장돼요 💾</span>
        </div>
      </div>
    </details>

    <label class="f">참가자 명단 (한 줄에 한 명)</label>
    <textarea id="names">${esc(MOCK)}</textarea>
    <div class="row">
      <button class="btn" id="run">봉투 뽑기 실행 🎲</button>
      <span class="count" id="cnt"></span>
    </div>
    <div class="note">🤫 <b>이 화면은 운영자만 보세요.</b> 짝은 일부러 화면에 안 띄웠어요 — 실수로 화면을 공유해도 정체가 새지 않게요. 각 <b>봉투 링크</b>를 해당 참가자에게 슬랙 DM으로 살짝 보내면 끝이에요.</div>
    <div id="result"></div>
  </div>`;

  const ta=document.getElementById('names');
  const cnt=document.getElementById('cnt');
  const upd=()=>{const n=ta.value.split('\n').map(s=>s.trim()).filter(Boolean).length;cnt.textContent=n+'명';document.getElementById('run').disabled=n<2;};
  ta.addEventListener('input',upd);upd();

  const readCfg=()=>{
    const title=(document.getElementById('mtitle').value.trim()||DEFAULT_MISSION_TITLE).slice(0,40);
    const per=parseInt(document.getElementById('mper').value,10)||DEFAULT_MISSIONS_PER;
    const missions=document.getElementById('mlist').value.split('\n').map(s=>s.trim()).filter(Boolean);
    const rules=document.getElementById('mrules').value.split('\n').map(s=>s.trim()).filter(Boolean);
    CFG={ title, per, missions:missions.length?missions:DEFAULT_MISSIONS.slice(), rules:rules.length?rules:DEFAULT_RULES.slice() };
    saveCfg(CFG);
  };
  ['mtitle','mper','mlist','mrules'].forEach(id=>{
    const el=document.getElementById(id);
    el.addEventListener('input',readCfg); el.addEventListener('change',readCfg);
  });
  document.getElementById('resetCfg').onclick=()=>{
    CFG={ title:DEFAULT_MISSION_TITLE, per:DEFAULT_MISSIONS_PER, missions:DEFAULT_MISSIONS.slice(), rules:DEFAULT_RULES.slice() };
    saveCfg(CFG);
    document.getElementById('mtitle').value=CFG.title;
    document.getElementById('mper').value=String(CFG.per);
    document.getElementById('mlist').value=CFG.missions.join('\n');
    document.getElementById('mrules').value=CFG.rules.join('\n');
    toast('기본값으로 되돌렸어요 ↺');
  };

  document.getElementById('run').onclick=()=>{
    const names=[...new Set(ta.value.split('\n').map(s=>s.trim()).filter(Boolean))];
    if(names.length<2){toast('최소 2명이 필요해요');return;}
    readCfg();
    if(CFG.missions.length < CFG.per){toast(`미션이 최소 ${CFG.per}개는 필요해요`);return;}
    ASSIGN=drawAssignments(names, CFG);
    renderResult();
  };
}

function renderResult(){
  const box=document.getElementById('result');
  const rows=ASSIGN.map(a=>{
    const payload={t:a.target,m:a.missions,r:CFG.rules,mt:CFG.title};
    const link=location.origin+location.pathname+'?e='+encodeURIComponent(b64.enc(payload));
    return `<div class="env-row">${envMini()}<span class="nm">${esc(a.giver)}님의 봉투</span>
      <span class="acts">
        <button class="btn ghost small" data-link="${esc(link)}">링크 복사</button>
        <button class="btn small" data-prev='${esc(JSON.stringify(payload))}'>미리보기</button>
      </span></div>`;
  }).join('');
  box.innerHTML=`<div class="row" style="margin-top:22px;justify-content:space-between">
      <p class="h2" style="margin:0">봉투 ${ASSIGN.length}개 준비 완료 💌</p>
      <button class="btn ghost small" id="redraw">다시 뽑기 ↺</button>
    </div>
    <div class="env-list">${rows}</div>
    <div class="note" style="margin-top:18px">배포하면 '링크 복사'가 <b>진짜 봉투 주소</b>가 돼요(예: <b>마음배달.우리팀/봉투?e=…</b>). 지금은 프로토타입이라 미리보기로 열어보세요.</div>`;
  document.getElementById('redraw').onclick=()=>{ASSIGN=drawAssignments(ASSIGN.map(a=>a.giver));renderResult();toast('다시 섞었어요 🎲');};
  box.querySelectorAll('[data-link]').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(b.dataset.link);toast('봉투 링크를 복사했어요 💌');});
  box.querySelectorAll('[data-prev]').forEach(b=>b.onclick=()=>{const d=JSON.parse(b.dataset.prev);renderRecipient(d,true);});
}

function renderRecipient(payload,fromOperator){
  app.innerHTML = brand() + `
  <div class="stage">
    <img class="hero" src="${ASSETS.hero}" alt="마음배달">
    <p class="to">💌 <b>마음배달</b>이 당신에게 도착했어요</p>
    <div class="env" id="env">${envSVG()}<div class="lift"></div></div>
    <p class="tap-hint" id="hint">봉투를 탭해서 열어보세요</p>
    <div class="letter" id="letter">
      <img class="kino-img" src="${ASSETS.kino}" alt="다정한 우체부 키노">
      <p class="lead">당신이 이번 주 챙길 마니또</p>
      <p class="target">${esc(payload.t)}님</p>
      <p class="target-sfx">이 사람의 '다정한 우체부'가 되어주세요 🤫</p>
      <p class="m-title"><span class="pill">이번 주 미션</span> ${esc(payload.mt||DEFAULT_MISSION_TITLE)}</p>
      ${payload.m.map((m,i)=>`<div class="m"><span class="no">${i+1}</span><span>${esc(m)}</span></div>`).join('')}
      <div class="rules">${(payload.r&&payload.r.length)? rulesHTML(payload.r) : LEGACY_RULES_HTML}</div>
      ${fromOperator?'<div class="backlink"><button class="btn ghost small" id="back">← 운영자 화면으로</button></div>':''}
    </div>
  </div>`;
  const env=document.getElementById('env');
  const open=()=>{if(env.classList.contains('opened'))return;env.classList.add('opened');document.getElementById('hint').style.opacity='0';setTimeout(()=>document.getElementById('letter').classList.add('show'),120);};
  env.addEventListener('click',open);
  if(fromOperator)document.getElementById('back').onclick=()=>renderOperator();
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* 진입: URL에 ?e= 있으면 수신자 화면, 없으면 운영자 화면 */
(function(){
  const p=new URLSearchParams(location.search).get('e');
  if(p){const d=b64.dec(decodeURIComponent(p));if(d&&d.t&&d.m){renderRecipient(d,false);return;}}
  renderOperator();
})();
</script>
